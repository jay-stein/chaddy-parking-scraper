name: Scrape Chadstone Parking & Traffic

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run scraper
        working-directory: scripts
        run: python scrape.py

      - name: Commit and push data
        run: |
          git config user.name "chaddy-scraper[bot]"
          git config user.email "chaddy-scraper[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
